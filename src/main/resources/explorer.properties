# Database table/layer names used by validation and map loading.
tables.sqlite.measurement=measurement

# GeoPackage layers
tables.geopackage.basin=basin
tables.geopackage.network=network

# Prefixes
tables.geopackage.topology.prefix=topology
tables.geopackage.simulation.prefix=sim
tables.geopackage.sgdata.prefix=observed_discharge
# State chart aggregation options and default.
charts.state.aggregation.options=1h,12h,24h,settimana,mese,anno
charts.state.aggregation.default=mese

# Fluxes chart columns/labels/colors (hex RGB)
charts.fluxes.columns.melting_discharge=melting_discharge
charts.fluxes.columns.canopy_throughfall=canopy_throughfall
charts.fluxes.columns.canopy_aet=canopy_aet
charts.fluxes.columns.rootzone_aet=rootzone_aet
charts.fluxes.columns.root_zone_recharge=root_zone_recharge
charts.fluxes.columns.ground_discharge=ground_discharge
charts.fluxes.columns.runoff_discharge=runoff_discharge
charts.fluxes.columns.rootzone_quick=rootzone_quick

charts.fluxes.labels.melting_discharge=melting_discharg
charts.fluxes.labels.canopy_throughfall=canopy_throughfall
charts.fluxes.labels.aet_sum=canopy_aet + rootzone_aet
charts.fluxes.labels.root_zone_recharge=root_zone_recharge
charts.fluxes.labels.ground_discharge=ground_discharge
charts.fluxes.labels.runoff_discharge=runoff_discharge
charts.fluxes.labels.rootzone_quick=rootzone_quick

charts.fluxes.colors.melting_discharge=#75C4FF
charts.fluxes.colors.canopy_throughfall=#22C55E
charts.fluxes.colors.aet_sum=#F97316
charts.fluxes.colors.root_zone_recharge=#784820
charts.fluxes.colors.ground_discharge=#808080
charts.fluxes.colors.runoff_discharge=#0000FF
charts.fluxes.colors.rootzone_quick=#4F46E5

# State chart columns/labels/colors (hex RGB)
charts.state.columns.swe=swe
charts.state.columns.rootzone_aet=rootzone_aet
charts.state.columns.canopy_aet=canopy_aet
charts.state.columns.canopy_final=canopy_final
charts.state.columns.canopy_initial=canopy_initial
charts.state.columns.rootzone_final=rootzone_final
charts.state.columns.rootzone_initial=rootzone_initial
charts.state.columns.runoff_final=runoff_final
charts.state.columns.runoff_initial=runoff_initial
charts.state.columns.ground_final=ground_final
charts.state.columns.ground_initial=ground_initial

charts.state.labels.swe=swe
charts.state.labels.aet_sum=rootzone_aet + canopy_aet
charts.state.labels.canopy_delta=canopy_final - canopy_initial
charts.state.labels.rootzone_delta=rootzone_final - rootzone_initial
charts.state.labels.runoff_delta=runoff_final - runoff_initial
charts.state.labels.ground_delta=ground_final - ground_initial

charts.state.colors.swe=#808080
charts.state.colors.aet_sum=#F97316
charts.state.colors.canopy_delta=#22C55E
charts.state.colors.rootzone_delta=#784820
charts.state.colors.runoff_delta=#0000FF
charts.state.colors.ground_delta=#7D7D7D

# Legacy folder mode defaults.
legacy.files.subbasins.shp=subbasins_complete.shp
legacy.files.network.shp=network_complete.shp
legacy.files.subbasins.csv=subbasins.csv
legacy.files.topology.csv=topology.csv
legacy.timeseries.prefixes=C_AET_,C_S_,C_Throughfall_,freezing_,GW_S_,Md_,melting_,Q_,Q_fast_,Q_slow_,Q_mm_,Q_fast_mm_,Q_slow_mm_,RZ_AET_,RZ_S_,SWE_
legacy.timeseries.discharge.prefix=Q_
legacy.timeseries.streamgauge.prefix=Q_
